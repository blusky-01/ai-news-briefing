<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>AI 브리핑 아카이브</title>
<style>
:root{--bg1:#070a13;--bg2:#10192c;--text:#eef4ff;--muted:#a9b6cf;--line:rgba(255,255,255,.12);--shadow:0 12px 40px rgba(0,0,0,.28)}
*{box-sizing:border-box} body{margin:0;color:var(--text);font-family:"SF Pro Display","Segoe UI",Apple SD Gothic Neo,"Malgun Gothic",sans-serif;background:linear-gradient(180deg,var(--bg1),var(--bg2));}
.wrap{max-width:980px;margin:0 auto;padding:20px 14px 48px} .hero,.row,.empty,.toolbar{background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,.05));border:1px solid var(--line);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:var(--shadow)}
.hero{border-radius:28px;padding:22px 20px;margin-bottom:18px} h1{margin:0 0 8px;font-size:34px} .sub{color:var(--muted)}
.toolbar{display:grid;grid-template-columns:1fr 180px 140px;gap:10px;padding:12px;border-radius:20px;margin-bottom:16px} .toolbar input,.toolbar select{width:100%;padding:12px 14px;border-radius:14px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:var(--text)}
.list{display:grid;gap:12px} .row{display:grid;grid-template-columns:180px 1fr auto;gap:12px;align-items:center;padding:16px 18px;border-radius:20px;text-decoration:none;color:inherit} .row:hover{transform:translateY(-1px)}
.date{font-weight:800} .desc-main{color:#dfe8ff} .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px} .chip{padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);font-size:12px;color:#dce7ff} .filter-chip{cursor:pointer}
.go{color:#bcd2ff;font-size:14px} .empty{padding:20px;border-radius:20px;color:var(--muted)} .hidden{display:none!important} .count{margin:10px 2px 14px;color:var(--muted);font-size:13px}
@media (max-width:700px){.toolbar{grid-template-columns:1fr} .row{grid-template-columns:1fr;} .go{font-size:13px} h1{font-size:28px}}
</style></head><body><div class="wrap"><div class="hero"><h1>AI 브리핑 아카이브</h1><div class="sub">날짜/키워드/국가 기준으로 저장된 브리핑을 다시 찾을 수 있습니다. 최신 브리핑은 <a href="../index.html" style="color:#bfd2ff">여기</a>에서 볼 수 있습니다.</div></div><div class="toolbar"><input id="q" placeholder="날짜, 기업명, 키워드로 검색"><select id="country"><option value="">전체 국가</option><option value="국내">국내</option><option value="미국">미국</option><option value="글로벌">글로벌</option><option value="혼합">혼합</option></select><select id="range"><option value="all">전체 기간</option><option value="7">최근 7일</option><option value="30">최근 30일</option></select></div><div class="count" id="count"></div><div class="list" id="list"><a class="row" href="./2026-03-25.html" data-date="2026-03-25" data-country="혼합" data-keywords="코딩 AI, M&A, 개발자도구, Codex" data-entities="OpenAI, Astral, Anthropic, 네이버"><div class="date">2026-03-25</div><div class="desc"><div class="desc-main">오늘 흐름은 미국은 OpenAI 중심의 자본·개발자 도구·기업시장 확장, 국내는 광고·반도체·국산 AI칩 실증 같은 산업 적용이 핵심입니다. 즉, AI 경쟁의 중심이 모델 홍보에서 실제 매출과 인프라 장악으로 빠르게 이동하고 있습니다.</div><div class="chips"><span class="chip filter-chip" data-filter="혼합">혼합</span><span class="chip filter-chip" data-filter="코딩 AI">코딩 AI</span><span class="chip filter-chip" data-filter="M&A">M&A</span><span class="chip filter-chip" data-filter="개발자도구">개발자도구</span><span class="chip filter-chip" data-filter="OpenAI">OpenAI</span><span class="chip filter-chip" data-filter="Astral">Astral</span></div></div><div class="go">열기</div></a></div></div><script>
const q=document.getElementById('q'); const country=document.getElementById('country'); const range=document.getElementById('range'); const list=[...document.querySelectorAll('.row')]; const count=document.getElementById('count');
function apply(){ const term=q.value.trim().toLowerCase(); const c=country.value; const r=range.value; const today=new Date('2026-03-25'); let visible=0; list.forEach(el=>{ const text=(el.dataset.date+' '+el.dataset.country+' '+el.dataset.keywords+' '+(el.dataset.entities||'')+' '+el.innerText).toLowerCase(); let ok=!term||text.includes(term); if(ok&&c) ok=(el.dataset.country||'').includes(c); if(ok&&r!=='all'){ const d=new Date(el.dataset.date); const diff=(today-d)/(1000*60*60*24); ok=diff>=0 && diff<Number(r); } el.classList.toggle('hidden',!ok); if(ok) visible++; }); count.textContent='검색 결과 '+visible+'건'; }
q.addEventListener('input',apply); country.addEventListener('change',apply); range.addEventListener('change',apply); document.querySelectorAll('.filter-chip').forEach(chip=>chip.addEventListener('click',e=>{ e.preventDefault(); e.stopPropagation(); q.value=chip.dataset.filter; apply(); })); apply();
</script></body></html>
