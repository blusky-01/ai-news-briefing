<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>개인 이미지 갤러리</title>
<style>
:root{--bg1:#070a13;--bg2:#10192c;--text:#eef4ff;--muted:#a9b6cf;--line:rgba(255,255,255,.12);--shadow:0 12px 40px rgba(0,0,0,.28)}
*{box-sizing:border-box}
body{margin:0;color:var(--text);font-family:"SF Pro Display","Segoe UI",Apple SD Gothic Neo,"Malgun Gothic",sans-serif;background:linear-gradient(180deg,var(--bg1),var(--bg2));}
.wrap{max-width:1180px;margin:0 auto;padding:24px 16px 48px}
.hero,.card{background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,.05));border:1px solid var(--line);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:var(--shadow);border-radius:28px}
.hero{padding:24px 22px;margin-bottom:18px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}
.card{padding:14px}
h1{margin:0 0 8px;font-size:34px}.sub{color:var(--muted);line-height:1.6}
.thumb{display:block;border-radius:18px;overflow:hidden}.thumb img{width:100%;height:220px;object-fit:cover;display:block}
.title{font-size:18px;font-weight:700;margin:12px 0 6px}.meta{color:var(--muted);font-size:14px}
a{color:#bfd2ff;text-decoration:none} a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="wrap">
  <section class="hero">
    <h1>개인 이미지 갤러리</h1>
    <div class="sub">즐겨찾기용 이미지 페이지 모음입니다. 앞으로 이미지 업로드용 기본 진입점으로 확장할 수 있습니다.</div>
  </section>
  <section class="grid">
    <article class="card">
      <a class="thumb" href="./tumbler-bicycle-bus.html"><img src="./tumbler_bicycle_bus.jpg" alt="텀블러 자전거 버스"></a>
      <div class="title"><a href="./tumbler-bicycle-bus.html">텀블러 · 자전거 · 버스</a></div>
      <div class="meta">원본 이미지 기반 단일 페이지</div>
    </article>
  </section>
</div>
</body>
</html>
