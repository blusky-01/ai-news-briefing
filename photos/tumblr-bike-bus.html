<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>텀블러 · 자전거 · 버스</title>
<style>
:root{--bg1:#070a13;--bg2:#10192c;--text:#eef4ff;--muted:#a9b6cf;--line:rgba(255,255,255,.12);--shadow:0 12px 40px rgba(0,0,0,.28)}
*{box-sizing:border-box}
body{margin:0;color:var(--text);font-family:"SF Pro Display","Segoe UI",Apple SD Gothic Neo,"Malgun Gothic",sans-serif;background:linear-gradient(180deg,var(--bg1),var(--bg2));}
.wrap{max-width:1100px;margin:0 auto;padding:24px 16px 48px}
.hero,.panel{background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,.05));border:1px solid var(--line);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:var(--shadow);border-radius:28px}
.hero{padding:24px 22px;margin-bottom:18px}
.panel{padding:18px}
h1{margin:0 0 8px;font-size:34px}
.sub{color:var(--muted);line-height:1.6}
.imgbox{display:flex;justify-content:center;align-items:center;padding:10px}
img{max-width:100%;height:auto;border-radius:20px;display:block}
.meta{margin-top:14px;color:var(--muted);font-size:14px}
a{color:#bfd2ff;text-decoration:none} a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="wrap">
  <section class="hero">
    <h1>텀블러 · 자전거 · 버스</h1>
    <div class="sub">즐겨찾기용 사진 페이지입니다. 필요할 때 언제든 바로 열어볼 수 있도록 GitHub Pages로 게시한 고정 페이지입니다.</div>
    <div class="meta"><a href="../index.html">AI 브리핑 메인으로 이동</a> · <a href="./tumblr-bike-bus.jpg" target="_blank" rel="noopener">원본 크기로 열기</a> · <a href="./tumblr-bike-bus.jpg" download>원본 다운로드</a></div>
  </section>
  <section class="panel">
    <div class="imgbox">
      <a href="./tumblr-bike-bus.jpg" target="_blank" rel="noopener">
        <img src="./tumblr-bike-bus.jpg" alt="검은 텀블러, 민트색 자전거, 파란 버스가 함께 보이는 사진">
      </a>
    </div>
    <div class="meta">사진을 누르면 원본 크기로 열립니다.</div>
  </section>
</div>
</body>
</html>
